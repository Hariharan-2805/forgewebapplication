{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="mb-8">
        <a href="{% url 'dashboard' %}" class="text-sm text-gray-500 hover:text-gray-900 flex items-center gap-2 mb-4">
            <i class="fa-solid fa-arrow-left"></i> Back to Dashboard
        </a>
        <h1 class="text-3xl font-bold text-gray-900">Create a New Queue</h1>
        <p class="text-gray-500 mt-1">Set up a virtual queue for your facility (e.g., Hospital, Restaurant, Office).</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 md:p-8">
        <form method="POST" action="{% url 'create_queue' %}">
            {% csrf_token %}
            
            <div class="space-y-6">
                <div>
                    <label for="name" class="block text-sm font-medium text-gray-700">Queue Name</label>
                    <div class="mt-1">
                        <input type="text" name="name" id="name" required placeholder="e.g. Dr. Smith Consultation" class="appearance-none block w-full px-4 py-3 border border-gray-300 rounded-xl shadow-sm placeholder-gray-400 focus:outline-none focus:ring-emerald-500 focus:border-emerald-500 sm:text-sm">
                    </div>
                </div>

                <div>
                    <label for="description" class="block text-sm font-medium text-gray-700">Description (Optional)</label>
                    <div class="mt-1">
                        <textarea name="description" id="description" rows="3" placeholder="Brief details about what the queue is for..." class="appearance-none block w-full px-4 py-3 border border-gray-300 rounded-xl shadow-sm placeholder-gray-400 focus:outline-none focus:ring-emerald-500 focus:border-emerald-500 sm:text-sm"></textarea>
                    </div>
                </div>

                <div>
                    <label for="avg_wait_time_per_person" class="block text-sm font-medium text-gray-700">Average Wait Time Per Person (Minutes)</label>
                    <div class="mt-1">
                        <input type="number" name="avg_wait_time_per_person" id="avg_wait_time_per_person" value="5" min="1" required class="appearance-none block w-full px-4 py-3 border border-gray-300 rounded-xl shadow-sm focus:outline-none focus:ring-emerald-500 focus:border-emerald-500 sm:text-sm">
                    </div>
                    <p class="mt-2 text-sm text-gray-500">This helps calculate the estimated waiting time for people joining the queue.</p>
                </div>

                <div class="pt-4 border-t border-gray-100 flex justify-end gap-3">
                    <a href="{% url 'dashboard' %}" class="px-6 py-3 border border-gray-300 rounded-xl shadow-sm text-base font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 smooth-hover">
                        Cancel
                    </a>
                    <button type="submit" class="px-6 py-3 border border-transparent rounded-xl shadow-sm text-base font-medium text-white bg-emerald-600 hover:bg-emerald-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-500 smooth-hover">
                        Create Queue
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
