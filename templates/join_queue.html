{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="mb-8">
        <a href="{% url 'dashboard' %}" class="text-sm text-gray-500 hover:text-gray-900 flex items-center gap-2 mb-4">
            <i class="fa-solid fa-arrow-left"></i> Back to Dashboard
        </a>
        <h1 class="text-3xl font-bold text-gray-900">Join a Queue</h1>
        <p class="text-gray-500 mt-1">Select a facility to join their virtual line securely.</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 md:p-8">
        <form method="POST">
            {% csrf_token %}
            
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Available Facilities</label>
                    <div class="grid grid-cols-1 gap-4">
                        {% for queue in queues %}
                        <label class="relative flex cursor-pointer rounded-xl border bg-white p-4 shadow-sm focus:outline-none hover:border-indigo-300 smooth-hover">
                            <input type="radio" name="queue_id" value="{{ queue.id }}" class="sr-only" required>
                            <span class="flex flex-1">
                                <span class="flex flex-col">
                                    <span class="block text-lg font-bold text-gray-900">{{ queue.name }}</span>
                                    <span class="mt-1 flex items-center text-sm text-gray-500">
                                        <i class="fa-solid fa-info-circle mr-1"></i> {{ queue.description|default:"No description" }}
                                    </span>
                                    <span class="mt-2 text-sm font-medium text-emerald-600">
                                        <i class="fa-solid fa-clock"></i> ~{{ queue.avg_wait_time_per_person }} min / person
                                    </span>
                                </span>
                            </span>
                            <i class="fa-solid fa-check-circle text-indigo-600 text-xl hidden check-icon transition-all"></i>
                        </label>
                        {% empty %}
                        <div class="p-6 text-center text-gray-500 border border-dashed rounded-xl">
                            No active queues available right now.
                        </div>
                        {% endfor %}
                    </div>
                </div>

                <div class="pt-4 border-t border-gray-100">
                    <button type="submit" class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-xl shadow-sm text-lg font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 smooth-hover {% if not queues %}opacity-50 cursor-not-allowed{% endif %}" {% if not queues %}disabled{% endif %}>
                        Generate Virtual Token
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>

<style>
    input[type="radio"]:checked + span + .check-icon { display: block; }
    input[type="radio"]:checked ~ span { border-color: #6366f1; }
    label:has(input[type="radio"]:checked) { border-color: #6366f1; background-color: #eef2ff; }
</style>
{% endblock %}
