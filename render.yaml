services:
  - type: web
    name: smartqueue
    env: python
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn smartqueue.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.console.EmailBackend
      - key: DATABASE_URL
        fromDatabase:
          name: smartqueue-db
          property: connectionString

databases:
  - name: smartqueue-db
    plan: free
